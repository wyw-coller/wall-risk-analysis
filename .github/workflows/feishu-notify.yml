name: 上传文件同步飞书通知
on:
  push:
    branches: [ main ]

jobs:
  send-notice:
    runs-on: ubuntu-latest
    steps:
      - name: 发送飞书通知
        run: |
          curl -X POST ${{ secrets.FEISHU_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{
            "msg_type": "text",
            "content": {
              "text": "📁 GitHub 有新文件上传！\n上传者：${{ github.actor }}\n提交信息：${{ github.event.head_commit.message }}\n查看链接：${{ github.event.compare }}\n@所有人 请及时查看"
            }
          }'
